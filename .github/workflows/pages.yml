name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate sensitive files from secrets
        env:
          CARD_CONFIG_JSON: ${{ secrets.CARD_CONFIG_JSON }}
          CONTACT_VCF_CONTENT: ${{ secrets.CONTACT_VCF_CONTENT }}
        run: |
          set -euo pipefail
          mkdir -p public/assets
          if [ -z "${CARD_CONFIG_JSON}" ]; then
            echo "Missing secret: CARD_CONFIG_JSON"
            exit 1
          fi
          if [ -z "${CONTACT_VCF_CONTENT}" ]; then
            echo "Missing secret: CONTACT_VCF_CONTENT"
            exit 1
          fi
          printf '%s' "${CARD_CONFIG_JSON}" > public/config.json
          printf '%s' "${CONTACT_VCF_CONTENT}" > public/assets/contact.vcf

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

